<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F5F1EA">
  <title>FoodTrack · Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <main class="main-content" id="dashMain">
    <!-- Injected by JS -->
  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/nutrition.js"></script>
<script src="js/app.js"></script>
<script src="js/nav.js"></script>
<script>
// ── Dashboard Page Logic ──────────────────────────────────
const main = document.getElementById('dashMain');

async function renderDashboard() {
  const foods   = await getFoods();
  const targets = getTargets();
  const entries = getDayLog();
  const totals  = sumLogTotals(entries, foods);
  const status  = getCalorieStatus(totals.calories, targets.calories);
  const macros  = getMacroPercents(totals);
  const weekData = getWeekLogs();
  const remain  = targets.calories - totals.calories;

  // Build SVG ring
  const radius = 44, circ = 2 * Math.PI * radius;
  const fillPct = Math.min(totals.calories / targets.calories, 1);
  const dash = circ * fillPct;
  const ringColor = fillPct > 1.05 ? 'var(--coral)' : fillPct >= 0.95 ? 'var(--accent)' : 'var(--accent)';

  main.innerHTML = `
    <div class="page-header stagger">
      <div>
        <h1>Dashboard</h1>
        <p class="page-sub">${new Date().toLocaleDateString('en-MY',{weekday:'long',month:'long',day:'numeric'})}</p>
      </div>
      <span class="status-badge ${status.class}">${status.label}</span>
    </div>

    <!-- Calorie Ring Hero -->
    <div class="calorie-hero stagger fade-in">
      <div class="calorie-ring">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle cx="55" cy="55" r="${radius}" fill="none" stroke="var(--surface2)" stroke-width="10"/>
          <circle cx="55" cy="55" r="${radius}" fill="none"
            stroke="${ringColor}" stroke-width="10"
            stroke-dasharray="${dash} ${circ}"
            stroke-dashoffset="${circ * 0.25}"
            stroke-linecap="round"
            style="transition: stroke-dasharray .8s cubic-bezier(.34,1,.64,1)"
          />
          <text x="55" y="50" text-anchor="middle" font-family="DM Mono,monospace" font-size="13" fill="var(--text-3)">KCAL</text>
          <text x="55" y="68" text-anchor="middle" font-family="DM Mono,monospace" font-size="18" font-weight="500" fill="var(--text)" id="ringNum">0</text>
        </svg>
      </div>
      <div class="calorie-info">
        <div class="calorie-info__label">Calories Today</div>
        <div class="calorie-info__num" id="calNum">0</div>
        <div class="calorie-info__target">of ${fmtNum(targets.calories, 0)} kcal target</div>
        <div class="calorie-info__remain" style="color:${remain >= 0 ? 'var(--accent)' : 'var(--coral)'}">
          ${remain >= 0 ? '▼ ' + fmtNum(remain, 0) + ' remaining' : '▲ ' + fmtNum(Math.abs(remain), 0) + ' over'}
        </div>
      </div>
    </div>

    <!-- Macro Grid -->
    <div class="macro-grid stagger">
      ${buildMacroCard('Protein', totals.protein, targets.protein, 'g', 'macro-card--pro', 'protein')}
      ${buildMacroCard('Carbs', totals.carbs, targets.carbs, 'g', 'macro-card--carb', 'carbs')}
      ${buildMacroCard('Fat', totals.fat, targets.fat, 'g', 'macro-card--fat', 'fat')}
      ${buildMacroCard('Fiber', totals.fiber, targets.fiber || 30, 'g', 'macro-card--cal', 'fiber')}
    </div>

    <!-- Week overview -->
    <div class="card mt-12">
      <div class="card__title">7-day overview</div>
      <div class="week-chart" id="weekChart"></div>
    </div>

    <!-- Macro distribution -->
    <div class="card mt-12">
      <div class="card__title">Macro Distribution</div>
      ${totals.calories > 0 ? buildDonut(macros, totals) : '<p class="text-muted text-sm">No food logged today.</p>'}
    </div>

    <!-- Recent entries -->
    <div class="section-label">Today's Last Entries</div>
    <div id="recentEntries">
      ${entries.length === 0 ? buildEmptyState() : ''}
    </div>

    <!-- Quick add FAB -->
    <a class="fab" href="add-food.html" aria-label="Add food">+</a>
  `;

  // Animate calorie counters
  const calEl = document.getElementById('calNum');
  const ringEl = document.getElementById('ringNum');
  if (calEl) animateCount(calEl, totals.calories, 700);
  if (ringEl) animateCount(ringEl, totals.calories, 700);

  // Render week chart
  renderWeekChart(weekData, targets.calories);

  // Recent entries (last 3)
  const recent = [...entries].reverse().slice(0, 3);
  const recEl = document.getElementById('recentEntries');
  if (recent.length > 0 && recEl) {
    recEl.innerHTML = recent.map(e => {
      const food = foods.find(f => f.id === e.foodId);
      if (!food) return '';
      const n = calcNutrition(food, e.grams);
      return `
        <div class="log-item">
          <div class="log-item__dot" style="background:var(--accent)"></div>
          <div class="log-item__info">
            <div class="log-item__name">${food.name}</div>
            <div class="log-item__meta">${e.grams}g · ${n.protein}g protein</div>
          </div>
          <div class="log-item__kcal">${n.calories} kcal</div>
        </div>
      `;
    }).join('') + `<a href="log.html" class="btn btn--ghost btn--full mt-8">View full log →</a>`;
  }
}

function buildMacroCard(label, val, target, unit, cls, type) {
  const pct = progressPct(val, target);
  const over = val > target;
  return `
    <div class="macro-card ${cls}">
      <div class="macro-card__label">${label}</div>
      <div class="macro-card__numbers">
        <span class="macro-card__value">${fmtNum(val)}</span>
        <span class="macro-card__unit">${unit}</span>
      </div>
      <div class="macro-card__target">/ ${fmtNum(target, 0)}${unit}</div>
      <div class="progress-bar" data-type="${type}">
        <div class="progress-bar__fill ${over ? 'progress-bar__fill--over' : ''}" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

function buildDonut(macros, totals) {
  const size = 100, cx = 50, cy = 50, r = 38;
  const circ = 2 * Math.PI * r;
  const segments = [
    { label: 'Protein', pct: macros.protein, color: 'var(--accent)', val: totals.protein },
    { label: 'Carbs',   pct: macros.carbs,   color: 'var(--amber)',  val: totals.carbs },
    { label: 'Fat',     pct: macros.fat,      color: 'var(--blue)',   val: totals.fat }
  ];
  let offset = -0.25 * circ;
  const paths = segments.map(seg => {
    const dash = circ * seg.pct / 100;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="16"
      stroke-dasharray="${dash - 2} ${circ - dash + 2}" stroke-dashoffset="${offset}" />`;
    offset -= dash;
    return el;
  }).join('');

  const legend = segments.map(seg => `
    <div class="macro-legend__item">
      <div class="macro-legend__dot" style="background:${seg.color}"></div>
      <span>${seg.label}</span>
      <span class="text-mono" style="margin-left:auto;color:var(--text-2)">${seg.pct}% · ${fmtNum(seg.val)}g</span>
    </div>
  `).join('');

  return `
    <div class="macro-donut-wrap">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}
        <circle cx="${cx}" cy="${cy}" r="22" fill="var(--surface)"/>
      </svg>
      <div class="macro-legend">${legend}</div>
    </div>
  `;
}

function renderWeekChart(weekData, calTarget) {
  const chart = document.getElementById('weekChart');
  if (!chart) return;
  const maxCals = Math.max(...weekData.map(d => {
    const tots = sumLogTotals(d.entries, []);
    return tots.calories;
  }), calTarget, 100);

  chart.innerHTML = weekData.map(d => {
    const isToday = d.date === getTodayKey();
    // Simplified sum without food lookup for speed
    const stored = loadData(KEYS.LOGS, {});
    const entries = stored[d.date] || [];
    const foods = loadData(KEYS.FOODS, []);
    const tots = sumLogTotals(entries, foods);
    const h = Math.round((tots.calories / maxCals) * 64);
    const over = tots.calories > calTarget;
    const label = new Date(d.date + 'T00:00:00').toLocaleDateString('en',{weekday:'narrow'});
    return `
      <div class="week-bar">
        <div class="week-bar__fill ${isToday ? 'week-bar__fill--today' : ''} ${over ? 'week-bar__fill--over' : ''}"
          style="height:${h}px"></div>
        <div class="week-bar__label">${label}</div>
      </div>
    `;
  }).join('');
}

function buildEmptyState() {
  return `
    <div class="empty-state">
      <div class="empty-state__icon">🍽</div>
      <div class="empty-state__title">Nothing logged yet</div>
      <div class="empty-state__sub">Tap + to add your first meal today</div>
    </div>
  `;
}

renderDashboard();
</script>
</body>
</html>
