<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5F1EA">
  <title>FoodTrack · Add Food</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-shell">
  <main class="main-content">

    <div class="page-header">
      <div>
        <h1>Add Food</h1>
        <p class="page-sub">Search and log what you ate</p>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input class="search-input" id="searchInput" type="search" placeholder="Search foods… e.g. rice, chicken" autocomplete="off" autofocus>
      <div class="autocomplete-list" id="autocompleteList"></div>
    </div>

    <!-- Category pills -->
    <div class="cat-pills" id="catPills"></div>

    <!-- Selected food panel (hidden until food chosen) -->
    <div id="selectedPanel" class="hidden">
      <div class="card">
        <div class="flex-between mb-8">
          <div>
            <div id="selFoodName" style="font-weight:600;font-size:1rem"></div>
            <div id="selFoodCat" class="text-muted mt-4"></div>
          </div>
          <button class="btn btn--sm btn--ghost" id="clearSelBtn">✕ Clear</button>
        </div>

        <!-- Per-100g info -->
        <div class="nutrition-preview" id="per100Preview">
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="p100Cal">–</div>
            <div class="nutrition-preview__lbl">kcal</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="p100Pro">–</div>
            <div class="nutrition-preview__lbl">Protein</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="p100Car">–</div>
            <div class="nutrition-preview__lbl">Carbs</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="p100Fat">–</div>
            <div class="nutrition-preview__lbl">Fat</div>
          </div>
        </div>
        <p class="text-muted text-sm" style="text-align:center;margin-bottom:12px">per 100g</p>

        <!-- Input mode toggle -->
        <div class="toggle-row">
          <button class="toggle-btn active" id="modeGrams" onclick="setMode('grams')">⚖ Grams</button>
          <button class="toggle-btn" id="modePortion" onclick="setMode('portion')">🤜 Portion</button>
        </div>

        <!-- Grams input -->
        <div id="gramsSection">
          <div class="form-group">
            <label class="form-label">Amount (grams)</label>
            <div class="qty-row">
              <button class="qty-btn" onclick="adjustGrams(-10)">−</button>
              <input class="form-input qty-input" type="number" id="gramsInput" value="100" min="1" max="2000">
              <button class="qty-btn" onclick="adjustGrams(+10)">+</button>
            </div>
          </div>
        </div>

        <!-- Portion input -->
        <div id="portionSection" class="hidden">
          <div class="form-group">
            <label class="form-label">Portion</label>
            <select class="form-select" id="portionSelect"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity</label>
            <div class="qty-row">
              <button class="qty-btn" onclick="adjustQty(-0.5)">−</button>
              <input class="form-input qty-input" type="number" id="portionQty" value="1" min="0.5" max="20" step="0.5">
              <button class="qty-btn" onclick="adjustQty(+0.5)">+</button>
            </div>
          </div>
        </div>

        <!-- Live nutrition preview -->
        <div class="nutrition-preview" id="livePreview">
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="liveCal">0</div>
            <div class="nutrition-preview__lbl">kcal</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="livePro">0g</div>
            <div class="nutrition-preview__lbl">Protein</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="liveCar">0g</div>
            <div class="nutrition-preview__lbl">Carbs</div>
          </div>
          <div class="nutrition-preview__item">
            <div class="nutrition-preview__val" id="liveFat">0g</div>
            <div class="nutrition-preview__lbl">Fat</div>
          </div>
        </div>
        <p class="text-muted text-sm" style="text-align:center;margin-bottom:16px">for this serving</p>

        <!-- Meal label -->
        <div class="form-group">
          <label class="form-label">Meal (optional)</label>
          <select class="form-select" id="mealSelect">
            <option value="">No label</option>
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Snack">Snack</option>
            <option value="Pre-workout">Pre-workout</option>
            <option value="Post-workout">Post-workout</option>
          </select>
        </div>

        <button class="btn btn--primary btn--full mt-8" id="addBtn" onclick="addToLog()">
          + Add to Today's Log
        </button>
      </div>
    </div>

    <!-- Browse list (shown when not searching) -->
    <div id="browseList">
      <div class="section-label">Browse All Foods</div>
      <div id="foodGrid"></div>
    </div>

  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/nutrition.js"></script>
<script src="js/app.js"></script>
<script src="js/nav.js"></script>
<script>
let allFoods = [];
let selectedFood = null;
let currentMode = 'grams';
let userPortions = {};

async function init() {
  allFoods = await getFoods();
  userPortions = getPortions();
  renderCatPills();
  renderBrowseList(allFoods);
  bindSearch();
}

function renderCatPills() {
  const cats = ['All', ...new Set(allFoods.map(f => f.category || 'Other'))].sort();
  const el = document.getElementById('catPills');
  el.innerHTML = cats.map(c => `
    <button class="cat-pill ${c === 'All' ? 'active' : ''}" onclick="filterCat('${c}', this)">${c}</button>
  `).join('');
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'All' ? allFoods : allFoods.filter(f => (f.category || 'Other') === cat);
  renderBrowseList(filtered);
}

function renderBrowseList(foods) {
  const el = document.getElementById('foodGrid');
  if (!foods.length) { el.innerHTML = '<p class="text-muted text-sm">No foods found.</p>'; return; }
  el.innerHTML = foods.map(f => `
    <div class="food-item" onclick="selectFood('${f.id}')">
      <div class="food-item__header">
        <span class="food-item__name">${f.name}</span>
        ${f.custom ? '<span class="food-item__badge">Custom</span>' : ''}
      </div>
      <div class="food-item__macros">
        <span><b>${f.calories}</b> kcal</span>
        <span>P: ${f.protein}g</span>
        <span>C: ${f.carbs}g</span>
        <span>F: ${f.fat}g</span>
      </div>
    </div>
  `).join('');
}

function bindSearch() {
  const input = document.getElementById('searchInput');
  const list  = document.getElementById('autocompleteList');
  let idx = -1;

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { list.classList.remove('open'); renderBrowseList(allFoods); return; }

    const results = allFoods.filter(f =>
      f.name.toLowerCase().includes(q) ||
      (f.category || '').toLowerCase().includes(q)
    ).slice(0, 8);

    renderBrowseList(results);

    if (!results.length) { list.classList.remove('open'); return; }
    idx = -1;
    list.innerHTML = results.map((f, i) => `
      <div class="autocomplete-item" data-id="${f.id}" onclick="selectFood('${f.id}')">
        <div>
          <div class="autocomplete-item__name">${highlight(f.name, q)}</div>
          <div class="autocomplete-item__meta">${f.calories} kcal · P:${f.protein}g C:${f.carbs}g F:${f.fat}g</div>
        </div>
        <span class="autocomplete-item__cat">${f.category || ''}</span>
      </div>
    `).join('');
    list.classList.add('open');
  });

  // Keyboard nav
  input.addEventListener('keydown', e => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') { idx = Math.min(idx + 1, items.length - 1); setHighlight(items, idx); e.preventDefault(); }
    if (e.key === 'ArrowUp')   { idx = Math.max(idx - 1, 0); setHighlight(items, idx); e.preventDefault(); }
    if (e.key === 'Enter' && idx >= 0) { items[idx].click(); }
    if (e.key === 'Escape') { list.classList.remove('open'); }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrapper')) list.classList.remove('open');
  });
}

function setHighlight(items, i) {
  items.forEach((it, j) => it.classList.toggle('highlighted', j === i));
}

function highlight(text, q) {
  const re = new RegExp(`(${q})`, 'gi');
  return text.replace(re, '<mark style="background:var(--accent-lt);border-radius:2px">$1</mark>');
}

function selectFood(id) {
  selectedFood = allFoods.find(f => f.id === id);
  if (!selectedFood) return;

  document.getElementById('autocompleteList').classList.remove('open');
  document.getElementById('searchInput').value = selectedFood.name;
  document.getElementById('selectedPanel').classList.remove('hidden');
  document.getElementById('browseList').classList.add('hidden');

  document.getElementById('selFoodName').textContent = selectedFood.name;
  document.getElementById('selFoodCat').textContent = selectedFood.category || '';
  document.getElementById('p100Cal').textContent = selectedFood.calories;
  document.getElementById('p100Pro').textContent = selectedFood.protein + 'g';
  document.getElementById('p100Car').textContent = selectedFood.carbs + 'g';
  document.getElementById('p100Fat').textContent = selectedFood.fat + 'g';

  // Populate portion options
  const portSel = document.getElementById('portionSelect');
  const opts = buildPortionOptions(selectedFood, userPortions);
  portSel.innerHTML = opts.map(o => `<option value="${o.grams}">${o.label} (≈${o.grams}g)</option>`).join('');

  // Default grams from first portion
  if (opts.length) document.getElementById('gramsInput').value = opts[0].grams;

  updateLivePreview();
}

function buildPortionOptions(food, portions) {
  const opts = [];
  if (food.defaultPortions) {
    for (const [label, grams] of Object.entries(food.defaultPortions)) {
      opts.push({ label, grams });
    }
  }
  for (const [key, grams] of Object.entries(portions)) {
    opts.push({ label: '1 ' + key, grams });
  }
  return opts;
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('gramsSection').classList.toggle('hidden', mode !== 'grams');
  document.getElementById('portionSection').classList.toggle('hidden', mode !== 'portion');
  document.getElementById('modeGrams').classList.toggle('active', mode === 'grams');
  document.getElementById('modePortion').classList.toggle('active', mode === 'portion');
  updateLivePreview();
}

function getGrams() {
  if (currentMode === 'grams') {
    return parseFloat(document.getElementById('gramsInput').value) || 0;
  } else {
    const portGrams = parseFloat(document.getElementById('portionSelect').value) || 100;
    const qty = parseFloat(document.getElementById('portionQty').value) || 1;
    return portGrams * qty;
  }
}

function updateLivePreview() {
  if (!selectedFood) return;
  const g = getGrams();
  const n = calcNutrition(selectedFood, g);
  document.getElementById('liveCal').textContent = fmtNum(n.calories, 0);
  document.getElementById('livePro').textContent = fmtNum(n.protein) + 'g';
  document.getElementById('liveCar').textContent = fmtNum(n.carbs) + 'g';
  document.getElementById('liveFat').textContent = fmtNum(n.fat) + 'g';
}

function adjustGrams(delta) {
  const input = document.getElementById('gramsInput');
  input.value = Math.max(1, (parseFloat(input.value) || 0) + delta);
  updateLivePreview();
}

function adjustQty(delta) {
  const input = document.getElementById('portionQty');
  input.value = Math.max(0.5, (parseFloat(input.value) || 1) + delta);
  updateLivePreview();
}

document.addEventListener('change', e => {
  if (e.target.matches('#gramsInput, #portionSelect, #portionQty')) updateLivePreview();
});
document.addEventListener('input', e => {
  if (e.target.matches('#gramsInput, #portionQty')) updateLivePreview();
});

document.getElementById('clearSelBtn').addEventListener('click', () => {
  selectedFood = null;
  document.getElementById('selectedPanel').classList.add('hidden');
  document.getElementById('browseList').classList.remove('hidden');
  document.getElementById('searchInput').value = '';
  renderBrowseList(allFoods);
});

function addToLog() {
  if (!selectedFood) return;
  const grams = getGrams();
  if (!grams || grams <= 0) { showToast('Enter a valid amount', 'error'); return; }
  const meal = document.getElementById('mealSelect').value;
  addLogEntry({ foodId: selectedFood.id, grams, meal });
  const n = calcNutrition(selectedFood, grams);
  showToast(`${selectedFood.name} added (${n.calories} kcal)`);
  setTimeout(() => { window.location.href = 'index.html'; }, 900);
}

init();
</script>
</body>
</html>
